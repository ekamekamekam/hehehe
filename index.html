<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kissies for Shehbaz 💋</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ambient floating background hearts -->
  <div class="bg-hearts" id="bgHearts" aria-hidden="true"></div>

  <div class="sparkle-layer" id="sparkleLayer" aria-hidden="true"></div>

  <main class="stage">

    <p class="eyebrow">a very important scientific experiment by Ekam</p>

    <h1 class="title">
      <span class="title-line">How many kissies</span>
      <span class="title-line">can <span class="name">Shehbaz</span> collect today?</span>
    </h1>

    <div class="counter-card" id="counterCard">
      <div class="counter-glow"></div>
      <div class="count-number" id="countNumber">0</div>
      <div class="count-label" id="countLabel">kissies collected</div>
    </div>

    <button class="kiss-button" id="kissButton" aria-label="Tap for a kiss">
      <span class="kiss-button-emoji">💋</span>
      <span class="kiss-button-text">tap for a kiss</span>
      <span class="kiss-button-ring"></span>
    </button>

    <p class="message" id="message">go on... you know you want to</p>

    <div class="milestone-strip" id="milestoneStrip">
      <div class="milestone-track" id="milestoneTrack"></div>
    </div>

    <footer class="footer">
      made with 💗 (and mild obsession) by Ekam, for Shehbaz
    </footer>

  </main>

  <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
